<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮件</title>

<style>
body{
    margin:0;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:#f3f4f7;
    color:#333;
    height:100vh;
    overflow:hidden;
}

.mail-app{
    display:flex;
    height:100vh;
    width:100%;
}

.mail-sidebar{
    width:320px;
    background:#f7f8fb;
    border-right:1px solid #ddd;
    display:flex;
    flex-direction:column;
}

.mail-sidebar-header{
    padding:18px 20px 12px;
    border-bottom:1px solid #e5e5e5;
    background:#fff;
}

.mail-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.mail-folder-tabs{
    display:flex;
    gap:8px;
}

.folder-btn{
    padding:7px 14px;
    border-radius:18px;
    background:#eceff5;
    font-size:13px;
    cursor:pointer;
}

.folder-btn.active{
    background:#dce9ff;
    color:#1d5fd0;
    font-weight:bold;
}

.mail-list{
    flex:1;
    overflow-y:auto;
    padding:8px 0;
}

.mail-item{
    padding:12px 16px;
    border-bottom:1px solid #ececec;
    cursor:pointer;
    transition:0.2s;
}

.mail-item:hover{
    background:#eef4ff;
}

.mail-item.active{
    background:#dce9ff;
}

.mail-item.unread{
    background:#f7fbff;
}

.mail-item.unread .mail-sender,
.mail-item.unread .mail-subject{
    font-weight:bold;
}

.unread-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#3388ff;
    margin-right:8px;
}

.mail-item-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.mail-sender{
    font-size:14px;
    font-weight:bold;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.mail-time{
    font-size:12px;
    color:#999;
    white-space:nowrap;
}

.mail-subject{
    font-size:13px;
    margin:4px 0;
}

.mail-snippet{
    font-size:12px;
    color:#888;
    line-height:1.5;
}

.mail-content{
    flex:1;
    background:#fff;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.mail-content-header{
    padding:22px 28px 18px;
    border-bottom:1px solid #e8e8e8;
}

.mail-content-subject{
    font-size:28px;
    font-weight:bold;
    line-height:1.4;
    margin-bottom:14px;
}

.mail-meta{
    font-size:13px;
    color:#666;
    line-height:1.9;
}

.mail-body{
    flex:1;
    overflow-y:auto;
    padding:28px;
}

.mail-body-text{
    white-space:pre-wrap;
    font-size:16px;
    line-height:1.95;
}

.empty-state{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#999;
    font-size:16px;
    height:100%;
}

.mobile-back-btn{
    display:none;
    padding:14px 16px;
    border-bottom:1px solid #eee;
    background:#fff;
    font-size:14px;
    color:#3388ff;
    cursor:pointer;
}

/* 平板 */
@media (max-width: 900px){
    .mail-sidebar{
        width:260px;
    }

    .mail-content-subject{
        font-size:22px;
    }

    .mail-body{
        padding:20px;
    }
}

/* 手机 */
@media (max-width: 768px){
    .mail-app{
        display:block;
    }

    .mail-sidebar{
        width:100%;
        height:100vh;
        border-right:none;
    }

    .mail-content{
        display:none;
        width:100%;
        height:100vh;
    }

    .mail-content.mobile-show{
        display:flex;
    }

    .mail-sidebar.mobile-hide{
        display:none;
    }

    .mobile-back-btn{
        display:block;
    }

    .mail-content-header{
        padding:16px;
    }

    .mail-content-subject{
        font-size:20px;
    }

    .mail-body{
        padding:16px;
    }

    .mail-body-text{
        font-size:15px;
        line-height:1.8;
    }
}
</style>
</head>

        let currentFolder = 'inbox';
        let currentMailId = null;

        function getCurrentMails() {
            const unlocked = localStorage.getItem('mail_linqinnan_unlocked') === '1';

            if (currentFolder === 'inbox') {
                const mails = [...inboxMails];

                if (unlocked) {
                    mails.unshift(linqinnanMail);
                }

                return mails;
            }

            const mails = [...sentMails];

            if (unlocked) {
                mails.unshift(sentReplyToLin);
            }

            return mails;
        }

        function switchFolder(folder, el) {
            currentFolder = folder;
            currentMailId = null;

            document.querySelectorAll('.folder-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');

            renderMailList();
            renderEmpty();
        }

        function renderEmpty() {
            document.getElementById('mail-view').innerHTML = `<div class="empty-state">请选择一封邮件</div>`;
        }

        function openMail(mailId) {
            currentMailId = mailId;

            if (mailId === 'inbox-linqinnan') {
                    window.parent.postMessage({
                        type: 'UNLOCK_AUDIO'
                    }, '*');
                localStorage.setItem('mail_linqinnan_unread', '0');

                if (localStorage.getItem('phone_delivery_started') !== '1') {
                    window.parent.postMessage({
                        type: 'START_PHONE_COUNTDOWN'
                    }, '*');
                }
            }

            renderMailList();

            const mails = getCurrentMails();
            const mail = mails.find(m => m.id === mailId);
            if (!mail) return;

            if (currentFolder === 'inbox') {
                document.getElementById('mail-view').innerHTML = `
                    <div class="mail-content-header">
                        <div class="mail-content-subject">${mail.subject}</div>
                        <div class="mail-meta">

                            <div><strong>收件人：</strong>欧明 &lt;oming.work@protonmail.com&gt;</div>
                            <div><strong>日期：</strong>${mail.time}</div>
                        </div>
                    </div>
                    <div class="mail-body">
                        <div class="mail-body-text">${mail.body}</div>
                    </div>
                `;
            } else {
                document.getElementById('mail-view').innerHTML = `
                    <div class="mail-content-header">
                        <div class="mail-content-subject">${mail.subject}</div>
                        <div class="mail-meta">
                            <div><strong>发件人：</strong>欧明 &lt;${mail.email}&gt;</div>
                            <div><strong>收件人：</strong>${mail.recipient} &lt;${mail.recipientEmail}&gt;</div>
                            <div><strong>日期：</strong>${mail.time}</div>
                        </div>
                    </div>
                    <div class="mail-body">
                        <div class="mail-body-text">${mail.body}</div>
                    </div>
                `;
            }

            if (window.innerWidth <= 768) {
                document.getElementById('mail-sidebar').classList.add('mobile-hide');
                document.getElementById('mail-content').classList.add('mobile-show');
            }
        }

        function renderMailList() {
            const list = document.getElementById('mail-list');
            const mails = getCurrentMails();

            list.innerHTML = mails.map(mail => {
                const isUnread = mail.id === 'inbox-linqinnan' && localStorage.getItem('mail_linqinnan_unread') === '1';

                return `
                    <div class="mail-item ${mail.id === currentMailId ? 'active' : ''} ${isUnread ? 'unread' : ''}" onclick="openMail('${mail.id}')">
                        <div class="mail-item-top">
                            <div class="mail-sender">
                                ${isUnread ? '<span class="unread-dot"></span>' : ''}
                                ${currentFolder === 'inbox' ? mail.sender : mail.recipient}
                            </div>
                            <div class="mail-time">${mail.time}</div>
                        </div>
                        <div class="mail-subject">${mail.subject}</div>
                        <div class="mail-snippet">${mail.snippet}</div>
                    </div>
                `;
            }).join('');
        }

        renderMailList();
        openMail('inbox-2');

        function goToHub() {
            window.parent.postMessage({

            window.parent.postMessage({

        function isMobile(){
            return window.innerWidth <= 768;

        function backToMailList(){
            document.getElementById('mail-sidebar').classList.remove('mobile-hide');
            document.getElementById('mail-content').classList.remove('mobile-show');
        }

        const originalOpenMail = openMail;
        openMail = function(mailId){
            originalOpenMail(mailId);

            if(isMobile()){
                document.getElementById('mail-sidebar').classList.add('mobile-hide');
                document.getElementById('mail-content').classList.add('mobile-show');
            }
