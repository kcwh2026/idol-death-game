<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林爱星的手机</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #111;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-stage {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 35%),
                linear-gradient(180deg, #1a1a1d 0%, #101013 100%);
            padding: 14px;
            box-sizing: border-box;
        }

        .phone-shell {
            position: relative;
            width: min(350px, 90vw);
            aspect-ratio: 9 / 19.5;
            background: #0b0b0d;
            border-radius: 38px;
            padding: 8px;
            box-sizing: border-box;
            box-shadow:
                0 24px 60px rgba(0,0,0,0.45),
                inset 0 0 0 1px rgba(255,255,255,0.08);
        }

        .phone-notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 26px;
            background: #000;
            border-radius: 0 0 16px 16px;
            z-index: 5;
        }

        .phone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            overflow: hidden;
            background-image: url('../../assets/images/posts/linaixing_diary4.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
        }

        .phone-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom, rgba(20,20,35,0.18), rgba(10,10,18,0.22)),
                radial-gradient(circle at top center, rgba(255,255,255,0.08), transparent 35%);
        }

        .status-bar {
            position: absolute;
            top: 16px;
            left: 18px;
            right: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            z-index: 2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.28);
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .signal {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
        }

        .signal span {
            display: block;
            width: 4px;
            background: rgba(255,255,255,0.95);
            border-radius: 2px;
        }

        .signal span:nth-child(1) { height: 5px; }
        .signal span:nth-child(2) { height: 8px; }
        .signal span:nth-child(3) { height: 11px; }
        .signal span:nth-child(4) { height: 14px; }

        .battery {
            position: relative;
            width: 28px;
            height: 15px;
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }

        .battery::after {
            content: "";
            position: absolute;
            right: -4px;
            width: 3px;
            height: 7px;
            border-radius: 0 2px 2px 0;
            background: rgba(255,255,255,0.9);
        }

        .lock-main {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding: 72px 16px 18px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.22);
        }

        .date-text {
            font-size: 22px;
            font-weight: 600;
            margin-top: 26px;
            margin-bottom: 6px;
        }

        .time-text {
            font-size: 92px;
            line-height: 0.95;
            font-weight: 200;
            letter-spacing: -4px;
            margin-bottom: 10px;
        }

        .passcode-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-top: 2px;
            margin-bottom: 8px;
        }

        .passcode-hint {
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.92);
            margin-bottom: 14px;
        }

        .passcode-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 26px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            box-sizing: border-box;
            background: transparent;
        }

        .dot.filled {
            background: rgba(255,255,255,0.95);
        }

        .keypad-wrap {
            margin-top: auto;
            width: 100%;
            padding-bottom: 10px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 76px);
            justify-content: center;
            gap: 14px 26px;
        }

        .key {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
            font-size: 28px;
            font-weight: 400;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
        }

        .key:active {
            transform: scale(0.96);
            background: rgba(255,255,255,0.28);
        }

        .key.empty {
            visibility: hidden;
        }

        .bottom-actions {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px;
            font-size: 15px;
            color: rgba(255,255,255,0.92);
        }

        .bottom-actions span {
            cursor: pointer;
        }

        .error-text {
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
            color: #ffd6d6;
            font-size: 13px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            border-radius: 999px;
            background: rgba(255,255,255,0.92);
            z-index: 2;
        }

        @media (max-width: 430px) {
            .phone-shell {
                width: 92vw;
            }

            .time-text {
                font-size: 82px;
            }

            .keypad {
                grid-template-columns: repeat(3, 70px);
                gap: 12px 20px;
            }

            .key {
                width: 70px;
                height: 70px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="phone-stage">
        <div class="phone-shell">
            <div class="phone-notch"></div>

            <div class="phone-screen">
                <div class="status-bar">
                    <div>中国移动</div>
                    <div class="status-right">
                        <div class="signal">
                            <span></span><span></span><span></span><span></span>
                        </div>
                        <div>5G</div>
                        <div class="battery">52</div>
                    </div>
                </div>

                <div class="lock-main">
                    <div class="date-text">4月7日周二</div>
                    <div class="time-text">19:33</div>

                    <div class="passcode-title">输入密码</div>
                    <div class="passcode-hint">提示：我最幸福的那一天</div>

                    <div class="passcode-dots" id="passcode-dots"></div>

                    <div class="keypad-wrap">
                        <div class="keypad">
                            <button class="key" onclick="inputDigit('1')">1</button>
                            <button class="key" onclick="inputDigit('2')">2</button>
                            <button class="key" onclick="inputDigit('3')">3</button>
                            <button class="key" onclick="inputDigit('4')">4</button>
                            <button class="key" onclick="inputDigit('5')">5</button>
                            <button class="key" onclick="inputDigit('6')">6</button>
                            <button class="key" onclick="inputDigit('7')">7</button>
                            <button class="key" onclick="inputDigit('8')">8</button>
                            <button class="key" onclick="inputDigit('9')">9</button>
                            <button class="key empty"></button>
                            <button class="key" onclick="inputDigit('0')">0</button>
                            <button class="key empty"></button>
                        </div>

                        <div class="bottom-actions">
                            <span onclick="showEmergency()">紧急情况</span>
                            <span onclick="deleteDigit()">删除</span>
                        </div>

                        <div class="error-text" id="error-text"></div>
                    </div>
                </div>

                <div class="home-indicator"></div>
            </div>
        </div>
    </div>

    <script>
        const FAKE_PASSCODE = '20230520';
        const REAL_PASSCODE = '20180716';

        let currentInput = '';

        function updateDots() {
            const dotsWrap = document.getElementById('passcode-dots');
            dotsWrap.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';

                if (i < currentInput.length) {
                    dot.classList.add('filled');
                }

                dotsWrap.appendChild(dot);
            }
        }

        function inputDigit(digit) {
            if (currentInput.length >= 8) return;

            currentInput += digit;
            document.getElementById('error-text').innerText = '';
            updateDots();

            if (currentInput.length === 8) {
                setTimeout(checkPasscode, 120);
            }
        }

        function deleteDigit() {
            if (currentInput.length === 0) return;

            currentInput = currentInput.slice(0, -1);
            document.getElementById('error-text').innerText = '';
            updateDots();
        }

        function showEmergency() {
            document.getElementById('error-text').innerText = '暂无可用紧急联系人';
        }

        function checkPasscode() {
            if (currentInput === FAKE_PASSCODE) {
                localStorage.setItem('linaixing_phone_unlocked', '1');
                localStorage.setItem('linaixing_phone_mode', 'fake');

                window.parent.postMessage({
                    type: 'NAVIGATE',
                    url: 'pages/phone/linaixing_phone_home.html',
                    displayUrl: '林爱星的手机'
                }, '*');
                return;
            }

            if (currentInput === REAL_PASSCODE) {
                localStorage.setItem('linaixing_phone_unlocked', '1');
                localStorage.setItem('linaixing_phone_mode', 'real');

                window.parent.postMessage({
                    type: 'NAVIGATE',
                    url: 'pages/phone/linaixing_phone_real_home.html',
                    displayUrl: '林爱星的手机'
                }, '*');
                return;
            }

            document.getElementById('error-text').innerText = '密码错误';
            currentInput = '';

            setTimeout(() => {
                updateDots();
            }, 120);
        }

        updateDots();

        window.addEventListener('message', (e) => {
            if (e.data.type === 'BROWSER_BACK') {
                window.parent.postMessage({
                    type: 'NAVIGATE',
                    url: 'pages/ouming_mail.html',
                    displayUrl: '邮件'
                }, '*');
            }
        });
    </script>
</body>
</html>
