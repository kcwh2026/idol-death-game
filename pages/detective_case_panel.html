<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>案件面板</title>
<style>
body{
    font-family:-apple-system;
    background:#f7f7f8;
    margin:0;
    padding:40px;
}

.case-card{
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:220px;
    padding:16px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    padding:12px 24px;
    background:#3388ff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="case-card">
    <div class="title">当前委托案件</div>

    <p><b>委托人：</b>林琴楠</p>
    <p><b>案件名称：</b>林爱星死亡真相调查</p>
    <p><b>状态：</b>调查中</p>

    <h3>案件推理结果提交</h3>

    <textarea id="result" placeholder="请输入案件完整前因后果..."></textarea>

    <button onclick="submitCase()">提交结案报告</button>
</div>

<script>
function submitCase(){
    const result=document.getElementById('result').value;

    localStorage.setItem('final_case_result', result);

    alert("案件已提交");
}
</script>

</body>
</html>
