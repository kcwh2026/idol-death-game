<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Detective Hub</title>
<style>
body{
    margin:0;
    font-family: -apple-system;
    background:#f5f5f7;
}

.login-box{
    width:420px;
    margin:120px auto;
    background:white;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    padding:40px;
}

.title{
    font-size:30px;
    font-weight:bold;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:16px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3388ff;
    color:white;
    font-size:15px;
    cursor:pointer;
}

.login-hints{
    margin-top:18px;
    font-size:13px;
    color:#888;
    line-height:1.8;
}

.login-hints p{
    margin:4px 0;
}

.hl{
    background:#fff1a8;
    padding:2px 6px;
    border-radius:4px;
    font-weight:bold;
    color:#333;
}
</style>
</head>
<body>

<div class="login-box">
    <div class="title">Detective Hub</div>

    <input id="username" placeholder="账号名">
    <input id="password" type="password" placeholder="密码">

    <button onclick="login()">登录</button>

    <div class="login-hints">
    <p>Hint 1：账号和 <span class="hl">mail</span> 有关</p>
    <p>Hint 2：密码是 <span class="hl">birthday base 64</span></p>
</div>

<script>
function login(){
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if(
        user === "oming.work@protonmail.com" &&
        pass === "MTk5NDA5MDk="
    ){
        location.href = "detective_case_panel.html";
    }else{
        alert("账号或密码错误");
    }
}
</script>

</body>
</html>
